<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NightGames</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:url("IMG_7390.jpg") center/cover no-repeat fixed;
color:white;
}

header{
position:fixed;
top:0;
left:0;
right:0;
height:40px;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 15px;
background:black;
font-size:14px;
}

#version{
color:#ffd54a;
}

.screen{
display:none;
padding-top:60px;
height:100vh;
}

.active{
display:block;
}

.center{
text-align:center;
margin-top:120px;
}

input{
width:70%;
padding:12px;
border-radius:30px;
border:none;
background:rgba(255,255,255,0.25);
color:white;
font-size:16px;
text-align:center;
}

button{
border:none;
border-radius:30px;
padding:10px 25px;
margin-top:15px;
font-size:16px;
cursor:pointer;
}

.enterBtn{
background:#4caf50;
color:black;
}

.panel{
width:90%;
margin:auto;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
}

.playerRow{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.gameList{
max-height:250px;
overflow-y:auto;
}

.gameRow{
display:flex;
justify-content:space-between;
margin:10px 0;
}

.smallBtn{
background:rgba(255,255,255,0.25);
color:white;
padding:6px 12px;
margin-left:5px;
}

.supportBtn{
background:rgba(255,255,255,0.4);
}

</style>
</head>


<body>

<header>
<div>NightGames</div>
<div id="version">v1237</div>
<div>ONLINE</div>
</header>


<!-- LOGIN SCREEN -->

<div id="login" class="screen active">

<div class="center">

<input id="email" placeholder="Enter Email">

<br>

<button class="enterBtn" onclick="enterApp()">ENTER</button>

</div>

</div>



<!-- PLAYERS SCREEN -->

<div id="players" class="screen">

<div class="panel">

<h3>Players</h3>

<div id="playerList">

<div class="playerRow">
<span>Player 1</span>
<div>
<button class="smallBtn">Stats</button>
<button class="smallBtn">History</button>
</div>
</div>

<div class="playerRow">
<span>Player 2</span>
<div>
<button class="smallBtn">Stats</button>
<button class="smallBtn">History</button>
</div>
</div>

</div>

<br>

<button onclick="showScreen('games')">Continue</button>

</div>

</div>



<!-- GAMES SCREEN -->

<div id="games" class="screen">

<div class="panel">

<div style="display:flex;justify-content:space-between">

<h3>Games</h3>

<button class="supportBtn">❤ Support</button>

</div>

<div class="gameList">

<div class="gameRow">
<span>Killer</span>
<div>
<button class="enterBtn">Play</button>
<button class="smallBtn">Rules</button>
</div>
</div>

<div class="gameRow">
<span>Around The World</span>
<div>
<button class="enterBtn">Play</button>
<button class="smallBtn">Rules</button>
</div>
</div>

<div class="gameRow">
<span>Shanghai</span>
<div>
<button class="enterBtn">Play</button>
<button class="smallBtn">Rules</button>
</div>
</div>

<div class="gameRow">
<span>Half-It</span>
<div>
<button class="enterBtn">Play</button>
<button class="smallBtn">Rules</button>
</div>
</div>

</div>

</div>

</div>



<script>

function showScreen(id){

document.querySelectorAll(".screen").forEach(screen=>{
screen.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

function enterApp(){

let email=document.getElementById("email").value;

if(email===""){
alert("Please enter email");
return;
}

showScreen("players");

}

</script>

</body>
</html>
