<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Games</title>

<style>
  :root{
    --app-y-offset: 120px;
    --app-x-offset: 0px;

    --games-visible-rows: 2;
    --players-visible-rows: 2;

    --button-height: 48px;
    --button-radius: 8px;

    --accent-color: #00ff88;
    --gold-color: #d4af37;
    --text-color: #ffffff;

    --glass-opacity: 0.85;
  }

  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    font-family:Arial, sans-serif;
    color:var(--text-color);
    background:#000;
  }

  #landingScreen,
  #playersScreen{
    min-height:100vh;
    background-size:cover;
    background-position:center;
    display:none;
  }

  #landingScreen{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background-image:url("IMG_7390.jpeg");
    padding:20px;
    text-align:center;
  }

  #playersScreen{
    background-image:url("IMG_7315.jpeg");
    padding:20px;
  }

  #emailInput{
    width:min(420px, 90%);
    height:48px;
    padding:0 14px;
    border:none;
    border-radius:999px;
    font-size:16px;
  }

  #enterBtn{
    margin-top:12px;
    width:min(420px, 90%);
    height:48px;
    border:none;
    border-radius:999px;
    background:rgba(255,255,255,0.18);
    color:white;
    font-weight:bold;
    cursor:pointer;
  }

  #NG_APP{
    position:relative;
    top:var(--app-y-offset);
    left:var(--app-x-offset);
    width:100%;
    max-width:900px;
    margin:0 auto;
  }

  .NG_section{
    margin-bottom:20px;
  }

  .NG_section h2{
    margin:0 0 10px 0;
  }

  .NG_list{
    max-height:140px;
    overflow-y:auto;
  }

  .NG_row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:10px;
    margin-bottom:8px;
    background:rgba(0,0,0,0.4);
    border-radius:var(--button-radius);
  }

  .NG_name{
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .NG_buttons{
    display:flex;
    gap:6px;
    flex-wrap:nowrap;
  }

  .NG_buttons button,
  #NG_leaderboard_btn,
  #NG_donate_btn{
    height:var(--button-height);
    padding:0 12px;
    border:none;
    border-radius:var(--button-radius);
    cursor:pointer;
    font-weight:bold;
  }

  #NG_leaderboard_btn{
    width:100%;
  }

  #NG_donate_btn{
    width:100%;
    background:var(--gold-color);
    color:black;
  }
</style>
</head>
<body>

<!-- LANDING SCREEN -->
<div id="landingScreen">
  <input id="emailInput" type="email" placeholder="Enter your email">
  <button id="enterBtn">ENTER</button>
  <audio id="introAudio" src="New Recording 2.m4a" preload="auto"></audio>
</div>

<!-- PLAYERS SCREEN -->
<div id="playersScreen">
  <div id="NG_APP">

    <!-- GAMES SECTION -->
    <div class="NG_section" id="NG_games_section">
      <h2>Games</h2>
      <div class="NG_list" id="NG_games_list"></div>
    </div>

    <!-- LEADERBOARD BUTTON -->
    <div class="NG_section" id="NG_leaderboard_section">
      <button id="NG_leaderboard_btn">LEADERBOARD</button>
    </div>

    <!-- DONATE BUTTON -->
    <div class="NG_section" id="NG_donate_section">
      <button id="NG_donate_btn" onclick="NG_openDonate()">
        Help support future updates and development
      </button>
    </div>

    <!-- PLAYERS SECTION -->
    <div class="NG_section" id="NG_players_section">
      <h2>Players</h2>
      <div class="NG_list" id="NG_players_list"></div>
    </div>

  </div>
</div>

<script>
const NG_PLAYERS = [];
const NG_GAMES = [];

function NG_openDonate(){
  window.open("https://venmo.com/u/Steve-Moody-8","_blank");
}

function NG_addPlayer(name,email,online=false){
  NG_PLAYERS.push({
    name:name,
    email:email,
    online:online
  });
}

function NG_removePlayer(email){
  const index = NG_PLAYERS.findIndex(p => p.email === email);
  if(index !== -1){
    NG_PLAYERS.splice(index,1);
    NG_renderPlayers();
  }
}

function NG_addGame(id,name){
  NG_GAMES.push({
    id:id,
    name:name
  });
}

function NG_renderPlayers(){
  const list = document.getElementById("NG_players_list");
  if(!list) return;

  const players = [...NG_PLAYERS].sort((a,b)=>Number(b.online)-Number(a.online));
  list.innerHTML = "";

  players.forEach(player=>{
    const row = document.createElement("div");
    row.className = "NG_row";
    row.innerHTML = `
      <div class="NG_name">${player.name}</div>
      <div class="NG_buttons">
        <button>STATS</button>
        <button>HISTORY</button>
        <button onclick="NG_removePlayer('${player.email}')">REMOVE</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function NG_renderGames(){
  const list = document.getElementById("NG_games_list");
  if(!list) return;

  list.innerHTML = "";

  NG_GAMES.forEach(game=>{
    const row = document.createElement("div");
    row.className = "NG_row";
    row.innerHTML = `
      <div class="NG_name">${game.name}</div>
      <div class="NG_buttons">
        <button>ENTER</button>
        <button>RULES</button>
        <button>HISTORY</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function NG_boot(){
  NG_addGame("killer","Killer");
  NG_addGame("around_world","Around the World");
  NG_addGame("cricket","Cricket");
  NG_addGame("301","301");

  NG_addPlayer("Steve Moody","steve@email.com",true);
  NG_addPlayer("Taylor","taylor@email.com",false);

  NG_renderGames();
  NG_renderPlayers();
}

document.getElementById("emailInput").addEventListener("focus",function(){
  const audio = document.getElementById("introAudio");
  audio.play().catch(()=>{});
},{once:true});

document.getElementById("enterBtn").addEventListener("click",function(){
  document.getElementById("landingScreen").style.display = "none";
  document.getElementById("playersScreen").style.display = "block";
});

document.addEventListener("DOMContentLoaded",function(){
  NG_boot();
});
</script>
  <script>
/* =========================================================
KILLER START + NUMBER ASSIGNMENT
========================================================= */

if (typeof NG_KILLER === "undefined") {
  let NG_KILLER = {
    players: [],
    numbers: {},
    lives: {},
    killers: {},
    currentTurn: 0
  };
}

function NG_startKiller(players){
  NG_KILLER.players = [...players];
  NG_KILLER.numbers = {};
  NG_KILLER.lives = {};
  NG_KILLER.killers = {};
  NG_KILLER.currentTurn = 0;

  players.forEach(playerEmail => {
    NG_KILLER.lives[playerEmail] = 3;
    NG_KILLER.killers[playerEmail] = false;
  });
}

function NG_assignKillerNumbers(){
  const availableNumbers = [12,13,14,15,16,17,18,19,20];
  const shuffledPlayers = NG_shuffleArray([...NG_KILLER.players]);

  shuffledPlayers.forEach((playerEmail, index) => {
    NG_KILLER.numbers[playerEmail] = availableNumbers[index];
  });

  return NG_KILLER.numbers;
}

function NG_getCurrentPlayer(){
  return NG_KILLER.players[NG_KILLER.currentTurn] || null;
}

function NG_nextTurn(){
  NG_KILLER.currentTurn++;

  if (NG_KILLER.currentTurn >= NG_KILLER.players.length) {
    NG_KILLER.currentTurn = 0;
  }

  return NG_getCurrentPlayer();
}

function NG_startKillerGame(){
  const players = NG_getPlayers().map(p => p.email);

  if (!players.length) return;

  NG_startKiller(players);
  NG_assignKillerNumbers();

  if (typeof NG_renderKillerAll === "function") {
    NG_renderKillerAll();
  }
}
</script>
  <script>

/* =========================================================
KILLER RENDER + TURN DISPLAY
========================================================= */

function NG_renderKillerTurn(){

  const el = document.getElementById("NG_killer_current_player");
  if(!el) return;

  const player = NG_getCurrentPlayer();
  el.textContent = player || "None";

}

function NG_renderKillerNumbers(){

  const box = document.getElementById("NG_killer_numbers");
  if(!box) return;

  box.innerHTML = "";

  Object.keys(NG_KILLER.numbers).forEach(playerEmail => {

    const row = document.createElement("div");
    row.className = "NG_killer_number_row";

    row.innerHTML = `
      <span>${playerEmail}</span>
      <span>${NG_KILLER.numbers[playerEmail]}</span>
      <span>Lives: ${NG_KILLER.lives[playerEmail] ?? 0}</span>
      <span>${NG_KILLER.killers[playerEmail] ? "KILLER" : "NOT KILLER"}</span>
    `;

    box.appendChild(row);

  });

}

function NG_renderKillerAll(){

  NG_renderKillerTurn();
  NG_renderKillerNumbers();

}

</script>
  <script>

/* =========================================================
KILLER HIT + LIFE SYSTEM
========================================================= */

function NG_killerLoseLife(playerEmail){

  if(typeof NG_KILLER.lives[playerEmail] === "undefined") return;

  NG_KILLER.lives[playerEmail]--;

  if(NG_KILLER.lives[playerEmail] < 0){
    NG_KILLER.lives[playerEmail] = 0;
  }

  NG_renderKillerAll();

}

function NG_killerHit(){

  const currentPlayer = NG_getCurrentPlayer();
  if(!currentPlayer) return;

  if(NG_KILLER.killers[currentPlayer] === false){

    NG_KILLER.killers[currentPlayer] = true;

  } else {

    const targetIndex = (NG_KILLER.currentTurn + 1) % NG_KILLER.players.length;
    const targetPlayer = NG_KILLER.players[targetIndex];

    NG_killerLoseLife(targetPlayer);

  }

  NG_renderKillerAll();

}

function NG_killerNextTurn(){

  NG_nextTurn();
  NG_renderKillerAll();

}

</script>
  <script>

/* =========================================================
KILLER UI SECTION
========================================================= */

function NG_mountKillerSection(){

  const app = document.getElementById("NG_APP");
  if(!app) return;

  const section = document.createElement("div");
  section.className = "NG_section";
  section.id = "NG_killer_section";

  section.innerHTML = `
    <h2>Killer</h2>

    <div id="NG_killer_box">

      <div id="NG_killer_controls">

        <button onclick="NG_startKillerGame()">
          Start Killer
        </button>

        <button onclick="NG_killerNextTurn()">
          Next Turn
        </button>

        <button onclick="NG_killerHit()">
          Hit Number
        </button>

      </div>

      <div id="NG_killer_turn_box">
        Current Turn:
        <span id="NG_killer_current_player">None</span>
      </div>

      <div id="NG_killer_numbers"></div>

    </div>
  `;

  app.appendChild(section);

}

document.addEventListener("DOMContentLoaded", function(){

  if(typeof NG_mountKillerSection === "function"){
    NG_mountKillerSection();
  }

});

</script>

  if(typeof NG_renderKillerAll === "function"){

  <script>
/* =========================================================
KILLER WIN CHECK
========================================================= */

function NG_checkKillerWinner(){

  const alivePlayers = NG_KILLER.players.filter(playerEmail => {
    return (NG_KILLER.lives[playerEmail] ?? 0) > 0;
  });

  if(alivePlayers.length === 1){
    alert("Winner: " + alivePlayers[0]);
    return alivePlayers[0];
  }

  return null;
}

function NG_killerLoseLife(playerEmail){

  if(typeof NG_KILLER.lives[playerEmail] === "undefined") return;

  NG_KILLER.lives[playerEmail]--;

  if(NG_KILLER.lives[playerEmail] < 0){
    NG_KILLER.lives[playerEmail] = 0;
  }

  NG_renderKillerAll();
  NG_checkKillerWinner();
}
</script>

/* =========================================================
GAME REGISTRY
========================================================= */

function NG_registerDefaultGames(){

  if(typeof NG_GAMES === "undefined"){
    NG_GAMES = [];
  }

  if(NG_GAMES.length > 0) return;

  NG_GAMES.push({ id:"killer", name:"Killer" });
  NG_GAMES.push({ id:"around_world", name:"Around the World" });
  NG_GAMES.push({ id:"cricket", name:"Cricket" });
  NG_GAMES.push({ id:"301", name:"301" });

}


/* =========================================================
BOOT SYSTEM
========================================================= */

function NG_boot(){

  if(typeof NG_registerDefaultGames === "function"){
    NG_registerDefaultGames();
  }

  if(typeof NG_renderGames === "function"){
    NG_renderGames();
  }

  if(typeof NG_renderPlayers === "function"){
    NG_renderPlayers();
  }

}


/* =========================================================
PAGE START
========================================================= */

document.addEventListener("DOMContentLoaded", function(){

  if(typeof NG_boot === "function"){
    NG_boot();
  }

});

</script>
  <script>

/* =========================================================
KILLER TURN DISPLAY FIX
========================================================= */

function NG_renderKillerTurn(){

  const el = document.getElementById("NG_killer_current_player");
  if(!el) return;

  const player = NG_getCurrentPlayer();

  if(player){

  } else {

/* =========================================================
KILLER REFRESH ALL

  if(typeof NG_renderKillerNumbers === "function"){
    NG_renderKillerNumbers();
  }

}

</body>
