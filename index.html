
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Night Games</title>

<!-- ====================================================== -->
<!-- NIGHT GAMES MASTER BUILD                               -->
<!-- Organized learning build                               -->
<!-- You can safely edit sections marked SAFE TO EDIT       -->
<!-- ====================================================== -->

<!-- ====================================================== -->
<!-- SECTION 1 — VISUAL SETTINGS (SAFE TO EDIT)             -->
<!-- Change colors, fonts, layout                           -->
<!-- ====================================================== -->

<style>

body{
    background:#0b0f18;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    margin:0;
}

header{
    background:#020617;
    padding:20px;
    text-align:center;
    font-size:32px;
}

.panel{
    padding:20px;
    text-align:center;
}

button{
    padding:10px 20px;
    margin:6px;
    border-radius:6px;
    border:none;
    background:#22c55e;
    cursor:pointer;
}

input{
    padding:8px;
    font-size:16px;
}

.player{
    padding:6px;
}

.online{
    color:#22c55e;
}

</style>

</head>

<body>

<header>Night Games</header>


<!-- ====================================================== -->
<!-- SECTION 2 — LOGIN SCREEN                               -->
<!-- ====================================================== -->

<div id="loginScreen" class="panel">

<h2>Sign In</h2>

<input id="email" placeholder="enter email">

<br><br>

<button onclick="login()">ENTER</button>

</div>


<!-- ====================================================== -->
<!-- SECTION 3 — PLAYER PAGE                                -->
<!-- ====================================================== -->

<div id="playerScreen" class="panel" style="display:none">

<h2>Players</h2>

<div id="playerList"></div>

<hr>

<h2>Game Modes</h2>

<button onclick="practice()">Practice</button>
<button onclick="openLobby()">Multiplayer</button>

</div>


<!-- ====================================================== -->
<!-- SECTION 4 — MULTIPLAYER LOBBY                          -->
<!-- ====================================================== -->

<div id="lobbyScreen" class="panel" style="display:none">

<h2>Lobby</h2>

<div id="lobbyPlayers">Waiting for players...</div>

<br>

<button onclick="startGame()">Start Game</button>

</div>


<!-- ====================================================== -->
<!-- SECTION 5 — GAME AREA                                  -->
<!-- ====================================================== -->

<div id="gameScreen" class="panel" style="display:none">

<h2 id="turnDisplay"></h2>

<h3>Dart Board Test</h3>

<button onclick="throwDart(20)">20</button>
<button onclick="throwDart(19)">19</button>
<button onclick="throwDart(18)">18</button>
<button onclick="throwDart(5)">5</button>
<button onclick="throwDart(1)">1</button>

</div>


<!-- ====================================================== -->
<!-- SECTION 6 — PLAYER REGISTRY                            -->
<!-- Pre‑registered players                                 -->
<!-- ====================================================== -->

<script>

const players = {

"stevewmoody@yahoo.com":{name:"Steve Moody"},
"jmoody7712@gmail.com":{name:"Jayce Moody"},
"wmoody7931@aol.com":{name:"Bill Moody"}

};


let currentPlayer=null;



<!-- ====================================================== -->
<!-- SECTION 7 — LOGIN SYSTEM                               -->
<!-- ====================================================== -->

function login(){

const email=document.getElementById("email").value;

if(!players[email]){

const name=prompt("Enter your name");
players[email]={name:name};

}

currentPlayer=players[email];

document.getElementById("loginScreen").style.display="none";
document.getElementById("playerScreen").style.display="block";

showPlayers();

}



<!-- ====================================================== -->
<!-- SECTION 8 — PLAYER LIST DISPLAY                        -->
<!-- ====================================================== -->

function showPlayers(){

let list=document.getElementById("playerList");
list.innerHTML="";

for(let p in players){

let div=document.createElement("div");

div.className="player";

div.innerHTML=players[p].name+" <span class='online'>●</span>";

list.appendChild(div);

}

}



<!-- ====================================================== -->
<!-- SECTION 9 — PRACTICE MODE                              -->
<!-- Local single‑player                                    -->
<!-- ====================================================== -->

function practice(){

alert("Practice mode. Stats disabled.");

document.getElementById("playerScreen").style.display="none";
document.getElementById("gameScreen").style.display="block";

startTurn();

}



<!-- ====================================================== -->
<!-- SECTION 10 — MULTIPLAYER LOBBY                         -->
<!-- Placeholder structure for session system               -->
<!-- ====================================================== -->

function openLobby(){

document.getElementById("playerScreen").style.display="none";
document.getElementById("lobbyScreen").style.display="block";

}



function startGame(){

document.getElementById("lobbyScreen").style.display="none";
document.getElementById("gameScreen").style.display="block";

startTurn();

}



<!-- ====================================================== -->
<!-- SECTION 11 — TURN ORDER SYSTEM                         -->
<!-- ====================================================== -->

let turnOrder=[];
let currentTurn=0;

function startTurn(){

turnOrder=[currentPlayer.name];

currentTurn=0;

document.getElementById("turnDisplay").innerText="Turn: "+turnOrder[currentTurn];

}



<!-- ====================================================== -->
<!-- SECTION 12 — DART THROW ENGINE                         -->
<!-- ====================================================== -->

function throwDart(score){

alert(currentPlayer.name+" scored "+score);

}



<!-- ====================================================== -->
<!-- SECTION 13 — STATS SYSTEM (placeholder)                -->
<!-- ====================================================== -->

function recordStats(){

console.log("Stats recording placeholder");

}



<!-- ====================================================== -->
<!-- SECTION 14 — GAME MODULE SYSTEM                        -->
<!-- Future games plug in here                              -->
<!-- ====================================================== -->

const gameModules = {};

function registerGame(id,engine){

gameModules[id]=engine;

}



</script>

</body>
</html>
