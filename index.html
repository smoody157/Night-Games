<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Games</title>

<style>
  :root{
    --app-y-offset: 120px;
    --app-x-offset: 0px;

    --games-visible-rows: 2;
    --players-visible-rows: 2;

    --button-height: 48px;
    --button-radius: 8px;

    --accent-color: #00ff88;
    --gold-color: #d4af37;
    --text-color: #ffffff;

    --glass-opacity: 0.85;
  }

  *{
    box-sizing:border-box;
  }

  body{
    margin:0;
    font-family:Arial, sans-serif;
    color:var(--text-color);
    background:#000;
  }

  #landingScreen,
  #playersScreen{
    min-height:100vh;
    background-size:cover;
    background-position:center;
    display:none;
  }

  #landingScreen{
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background-image:url("IMG_7390.jpeg");
    padding:20px;
    text-align:center;
  }

  #playersScreen{
    background-image:url("IMG_7315.jpeg");
    padding:20px;
  }

  #emailInput{
    width:min(420px, 90%);
    height:48px;
    padding:0 14px;
    border:none;
    border-radius:999px;
    font-size:16px;
  }

  #enterBtn{
    margin-top:12px;
    width:min(420px, 90%);
    height:48px;
    border:none;
    border-radius:999px;
    background:rgba(255,255,255,0.18);
    color:white;
    font-weight:bold;
    cursor:pointer;
  }

  #NG_APP{
    position:relative;
    top:var(--app-y-offset);
    left:var(--app-x-offset);
    width:100%;
    max-width:900px;
    margin:0 auto;
  }

  .NG_section{
    margin-bottom:20px;
  }

  .NG_section h2{
    margin:0 0 10px 0;
  }

  .NG_list{
    max-height:140px;
    overflow-y:auto;
  }

  .NG_row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    padding:10px;
    margin-bottom:8px;
    background:rgba(0,0,0,0.4);
    border-radius:var(--button-radius);
  }

  .NG_name{
    flex:1;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  .NG_buttons{
    display:flex;
    gap:6px;
    flex-wrap:nowrap;
  }

  .NG_buttons button,
  #NG_leaderboard_btn,
  #NG_donate_btn{
    height:var(--button-height);
    padding:0 12px;
    border:none;
    border-radius:var(--button-radius);
    cursor:pointer;
    font-weight:bold;
  }

  #NG_leaderboard_btn{
    width:100%;
  }

  #NG_donate_btn{
    width:100%;
    background:var(--gold-color);
    color:black;
  }
</style>
</head>
<body>

<!-- LANDING SCREEN -->
<div id="landingScreen">
  <input id="emailInput" type="email" placeholder="Enter your email">
  <button id="enterBtn">ENTER</button>
  <audio id="introAudio" src="New Recording 2.m4a" preload="auto"></audio>
</div>

<!-- PLAYERS SCREEN -->
<div id="playersScreen">
  <div id="NG_APP">

    <!-- GAMES SECTION -->
    <div class="NG_section" id="NG_games_section">
      <h2>Games</h2>
      <div class="NG_list" id="NG_games_list"></div>
    </div>

    <!-- LEADERBOARD BUTTON -->
    <div class="NG_section" id="NG_leaderboard_section">
      <button id="NG_leaderboard_btn">LEADERBOARD</button>
    </div>

    <!-- DONATE BUTTON -->
    <div class="NG_section" id="NG_donate_section">
      <button id="NG_donate_btn" onclick="NG_openDonate()">
        Help support future updates and development
      </button>
    </div>

    <!-- PLAYERS SECTION -->
    <div class="NG_section" id="NG_players_section">
      <h2>Players</h2>
      <div class="NG_list" id="NG_players_list"></div>
    </div>

  </div>
</div>

<script>
const NG_PLAYERS = [];
const NG_GAMES = [];

function NG_openDonate(){
  window.open("https://venmo.com/u/Steve-Moody-8","_blank");
}

function NG_addPlayer(name,email,online=false){
  NG_PLAYERS.push({
    name:name,
    email:email,
    online:online
  });
}

function NG_removePlayer(email){
  const index = NG_PLAYERS.findIndex(p => p.email === email);
  if(index !== -1){
    NG_PLAYERS.splice(index,1);
    NG_renderPlayers();
  }
}

function NG_addGame(id,name){
  NG_GAMES.push({
    id:id,
    name:name
  });
}

function NG_renderPlayers(){
  const list = document.getElementById("NG_players_list");
  if(!list) return;

  const players = [...NG_PLAYERS].sort((a,b)=>Number(b.online)-Number(a.online));
  list.innerHTML = "";

  players.forEach(player=>{
    const row = document.createElement("div");
    row.className = "NG_row";
    row.innerHTML = `
      <div class="NG_name">${player.name}</div>
      <div class="NG_buttons">
        <button>STATS</button>
        <button>HISTORY</button>
        <button onclick="NG_removePlayer('${player.email}')">REMOVE</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function NG_renderGames(){
  const list = document.getElementById("NG_games_list");
  if(!list) return;

  list.innerHTML = "";

  NG_GAMES.forEach(game=>{
    const row = document.createElement("div");
    row.className = "NG_row";
    row.innerHTML = `
      <div class="NG_name">${game.name}</div>
      <div class="NG_buttons">
        <button>ENTER</button>
        <button>RULES</button>
        <button>HISTORY</button>
      </div>
    `;
    list.appendChild(row);
  });
}

function NG_boot(){
  NG_addGame("killer","Killer");
  NG_addGame("around_world","Around the World");
  NG_addGame("cricket","Cricket");
  NG_addGame("301","301");

  NG_addPlayer("Steve Moody","steve@email.com",true);
  NG_addPlayer("Taylor","taylor@email.com",false);

  NG_renderGames();
  NG_renderPlayers();
}

document.getElementById("emailInput").addEventListener("focus",function(){
  const audio = document.getElementById("introAudio");
  audio.play().catch(()=>{});
},{once:true});

document.getElementById("enterBtn").addEventListener("click",function(){
  document.getElementById("landingScreen").style.display = "none";
  document.getElementById("playersScreen").style.display = "block";
});

document.addEventListener("DOMContentLoaded",function(){
  NG_boot();
});
</script>

</body>
</html>
