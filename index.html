<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Night Games</title>

<!-- MASTER TRAINING BUILD -->
<!-- Organized so you can learn the architecture -->

<style>
body{background:#0b0f18;color:white;font-family:Arial;margin:0}
header{background:#020617;padding:20px;text-align:center;font-size:32px}
.panel{padding:20px;text-align:center}
button{padding:10px 20px;margin:6px;border-radius:6px;border:none;background:#22c55e}
input{padding:8px;font-size:16px}
.player{padding:6px}
.online{color:#22c55e}
</style>

</head>
<body>

<header>Night Games</header>

<!-- ===================================================== -->
<!-- SECTION 1 — LOGIN SCREEN -->
<!-- ===================================================== -->

<div id="loginScreen" class="panel">
<h2>Sign In</h2>
<input id="email" placeholder="enter email">
<br><br>
<button onclick="login()">ENTER</button>
</div>



<!-- ===================================================== -->
<!-- SECTION 2 — PLAYER PAGE -->
<!-- ===================================================== -->

<div id="playerScreen" class="panel" style="display:none">
<h2>Players</h2>
<div id="playerList"></div>
<hr>
<button onclick="practice()">Practice</button>
<button onclick="openLobby()">Multiplayer</button>
</div>



<!-- ===================================================== -->
<!-- SECTION 3 — MULTIPLAYER LOBBY -->
<!-- ===================================================== -->

<div id="lobbyScreen" class="panel" style="display:none">
<h2>Lobby</h2>
<div id="lobbyPlayers">Waiting for players...</div>
<button onclick="startGame()">Start Game</button>
</div>



<!-- ===================================================== -->
<!-- SECTION 4 — GAME AREA -->
<!-- ===================================================== -->

<div id="gameScreen" class="panel" style="display:none">
<h2 id="turnDisplay"></h2>
<button onclick="throwDart(20)">20</button>
<button onclick="throwDart(19)">19</button>
<button onclick="throwDart(18)">18</button>
<button onclick="throwDart(5)">5</button>
<button onclick="throwDart(1)">1</button>
</div>


<script>

/* ===================================================== */
/* SECTION 5 — PLAYER REGISTRY                           */
/* ===================================================== */

const players={
"stevewmoody@yahoo.com":{name:"Steve Moody"},
"jmoody7712@gmail.com":{name:"Jayce Moody"},
"wmoody7931@aol.com":{name:"Bill Moody"}
};

let currentPlayer=null;

/* ===================================================== */
/* SECTION 6 — LOGIN SYSTEM                              */
/* ===================================================== */

function login(){

const email=document.getElementById("email").value;

if(!players[email]){
const name=prompt("Enter your name");
players[email]={name:name};
}

currentPlayer=players[email];

document.getElementById("loginScreen").style.display="none";
document.getElementById("playerScreen").style.display="block";

showPlayers();

}

/* ===================================================== */
/* SECTION 7 — PLAYER LIST                               */
/* ===================================================== */

function showPlayers(){

let list=document.getElementById("playerList");
list.innerHTML="";

for(let p in players){

let div=document.createElement("div");
div.className="player";

div.innerHTML=players[p].name+" <span class='online'>●</span>";

list.appendChild(div);

}

}

/* ===================================================== */
/* SECTION 8 — PRACTICE MODE                             */
/* ===================================================== */

function practice(){

alert("Practice mode (local only)");

document.getElementById("playerScreen").style.display="none";
document.getElementById("gameScreen").style.display="block";

startTurn();

}

/* ===================================================== */
/* SECTION 9 — LOBBY SYSTEM                              */
/* ===================================================== */

function openLobby(){

document.getElementById("playerScreen").style.display="none";
document.getElementById("lobbyScreen").style.display="block";

}

/* ===================================================== */
/* SECTION 10 — START GAME                               */
/* ===================================================== */

function startGame(){

document.getElementById("lobbyScreen").style.display="none";
document.getElementById("gameScreen").style.display="block";

startTurn();

}

/* ===================================================== */
/* SECTION 11 — TURN SYSTEM                              */
/* ===================================================== */

let turnOrder=[];
let currentTurn=0;

function startTurn(){

turnOrder=[currentPlayer.name];
currentTurn=0;

document.getElementById("turnDisplay").innerText="Turn: "+turnOrder[currentTurn];

}

/* ===================================================== */
/* SECTION 12 — DART THROW ENGINE                        */
/* ===================================================== */

function throwDart(score){

alert(currentPlayer.name+" scored "+score);

}

/* ===================================================== */
/* SECTION 13 — STATS ENGINE (STRUCTURE)                  */
/* ===================================================== */

function recordStats(){

console.log("Stats placeholder");

}

/* ===================================================== */
/* SECTION 14 — GAME MODULE SYSTEM                        */
/* ===================================================== */

const gameModules={};

function registerGame(id,engine){

gameModules[id]=engine;

}

/* ===================================================== */
/* SECTION 15 — FIREBASE PLACEHOLDER                      */
/* ===================================================== */
/* Insert Firebase init + Firestore listeners here */

</script>

</body>
</html>
