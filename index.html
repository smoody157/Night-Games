<!DOCTYPE html>
<html>
<head>

<title>Night Games v1807</title>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ---------- GLOBAL ---------- */

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#080c16;
color:white;
overflow:hidden;
}

#app{
position:fixed;
inset:0;
}

/* ---------- SCREENS ---------- */

.screen{
display:none;
position:absolute;
inset:0;
padding:30px;
box-sizing:border-box;
}

.screen.active{
display:block;
}

/* ---------- BACKGROUND ---------- */

.background{
position:absolute;
inset:0;
background-image:url("https://raw.githubusercontent.com/smoody157/Night-Games/main/IMG_7390.jpeg");
background-size:cover;
background-position:center top;
z-index:0;
}

/* ---------- CONTENT ---------- */

.content{
position:relative;
z-index:1;
max-width:800px;
margin:auto;
}

/* ---------- BUTTONS ---------- */

button{
padding:14px 18px;
border:none;
border-radius:8px;
background:#2c5cff;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#4671ff;
}

/* ---------- INPUT ---------- */

input{
padding:12px;
font-size:16px;
border-radius:8px;
border:none;
margin-top:10px;
}

/* ---------- PANEL ---------- */

.panel{
background:rgba(0,0,0,.45);
padding:16px;
border-radius:12px;
margin-top:10px;
}

</style>

</head>
<body>

<div id="app">

<div class="background"></div>

<!-- LANDING -->

<div id="screen_landing" class="screen active">

<div class="content">

<h1>Night Games</h1>

<input id="playerName" placeholder="Enter your name">

<br>

<button onclick="enterApp()">Enter</button>

</div>

</div>

<!-- HUB -->

<div id="screen_hub" class="screen">

<div class="content">

<h2>Game Hub</h2>

<button onclick="createSession()">Create Game</button>

<div id="sessionList" class="panel"></div>

</div>

</div>

<!-- WAITING -->

<div id="screen_waiting" class="screen">

<div class="content">

<h2>Waiting Room</h2>

<div id="playerList" class="panel"></div>

<button onclick="startGame()">Start Game</button>
<button onclick="leaveRoom()">Leave</button>

</div>

</div>

<!-- GAME -->

<div id="screen_game" class="screen">

<div class="content">

<h2>Game</h2>

<div id="gameArea" class="panel"></div>

<button onclick="nextTurn()">Next Turn</button>
<button onclick="endGame()">End Game</button>

</div>

</div>

<!-- HISTORY -->

<div id="screen_history" class="screen">

<div class="content">

<h2>History</h2>

<div id="history"></div>

<button onclick="goHub()">Back</button>

</div>

</div>

</div>

<script>

/* ---------- STATE ---------- */

let playerName=null
let sessions=[]
let currentSession=null
let players=[]
let turn=0

/* ---------- SCREEN ROUTER ---------- */

function showScreen(id){

document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

/* ---------- LANDING ---------- */

function enterApp(){

playerName=document.getElementById("playerName").value.trim()

if(!playerName){

alert("Enter name")

return

}

showScreen("screen_hub")

renderSessions()

}

/* ---------- HUB ---------- */

function createSession(){

let session={
id:"session_"+Date.now(),
host:playerName,
players:[playerName]
}

sessions.push(session)

joinSession(session.id)

renderSessions()

}

function joinSession(id){

currentSession=sessions.find(s=>s.id===id)

players=currentSession.players

renderPlayers()

showScreen("screen_waiting")

}

function renderSessions(){

let box=document.getElementById("sessionList")

box.innerHTML=""

if(sessions.length===0){

box.innerHTML="No games"

return

}

sessions.forEach(s=>{

let div=document.createElement("div")

div.innerHTML=

"<b>"+s.host+"</b><br>"+
"<button onclick='joinSession(\""+s.id+"\")'>Join</button>"

box.appendChild(div)

})

}

/* ---------- WAITING ---------- */

function renderPlayers(){

let box=document.getElementById("playerList")

box.innerHTML=""

players.forEach(p=>{

let div=document.createElement("div")

div.textContent=p

box.appendChild(div)

})

}

function leaveRoom(){

showScreen("screen_hub")

}

/* ---------- GAME ---------- */

function startGame(){

turn=0

renderGame()

showScreen("screen_game")

}

function renderGame(){

let current=players[turn]

document.getElementById("gameArea").innerHTML=

"<b>Turn:</b> "+current

}

function nextTurn(){

turn++

if(turn>=players.length) turn=0

renderGame()

}

function endGame(){

saveHistory()

showScreen("screen_hub")

}

/* ---------- HISTORY ---------- */

let history=[]

function saveHistory(){

history.push({

players:[...players],
date:new Date().toLocaleString()

})

}

function renderHistory(){

let box=document.getElementById("history")

box.innerHTML=""

history.forEach(h=>{

let div=document.createElement("div")

div.innerHTML=h.players.join(", ")+" — "+h.date

box.appendChild(div)

})

}

function goHub(){

showScreen("screen_hub")

}

/* ---------- FIREBASE HOOKS ---------- */

/*
Place Firebase multiplayer code here if needed.
The local system above works without it.
*/

</script>

</body>
</html>
