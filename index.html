
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Night Games v1850</title>
<style>
html,body{
  margin:0;
  height:100%;
  background:#080c16 !important;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  color:white;
  overflow:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:url("https://raw.githubusercontent.com/smoody157/Night-Games/main/IMG_7390.jpeg");
  background-size:cover;
  background-position:center top;
  background-repeat:no-repeat;
  z-index:0;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(130% 110% at 50% 25%, rgba(0,0,0,0), rgba(0,0,0,.22) 60%, rgba(0,0,0,.52) 100%);
  z-index:0;
  pointer-events:none;
}

.screen{
  opacity:1 !important;
  visibility:visible !important;
  background:transparent !important;
}

.screen::before{
  z-index:-1 !important;
}

.screen,
.ng-panel,
#ngHeaderBar{
  position:relative;
  z-index:2 !important;
  width:100%;
  height:100%;
}

.card,
.ng-panel{
  width:min(680px,92vw);
  margin:120px auto 0 auto;
  padding:18px 20px;
  box-sizing:border-box;
  background:rgba(11,26,46,.42);
  border:1px solid rgba(255,255,255,.55);
  border-radius:22px;
  color:white;
  box-shadow:
    inset 0 2px 10px rgba(255,255,255,.45),
    inset 0 -2px 6px rgba(255,255,255,.20),
    0 18px 40px rgba(0,0,0,.35);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}

button{
  height:54px;
  padding:0 24px;
  font-size:16px;
  font-weight:800;
  letter-spacing:.08em;
  border:none;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.05));
  color:white;
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,.38),
    inset 0 -2px 6px rgba(0,0,0,.24),
    0 10px 24px rgba(0,0,0,.28);
}

input{
  width:100%;
  height:52px;
  padding:0 18px;
  box-sizing:border-box;
  border:none;
  outline:none;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.04));
  color:white;
  font-size:17px;
  text-align:center;
  box-shadow:
    inset 0 2px 8px rgba(255,255,255,.30),
    inset 0 -2px 6px rgba(0,0,0,.22);
}
input::placeholder{ color:rgba(255,255,255,.72); }
</style>
</head>

<body>

<div id="landing" class="screen active">
  <div class="card">
    <h2>Night Games v1850</h2>
    <p>App visibility unlock build.</p>
    <button onclick="show('players')">Enter</button>
  </div>
</div>

<div id="players" class="screen">
  <div class="card">
    <h2 style="margin-top:0;">Players</h2>
    <p>If you can see this, the app is unlocked and routing is working.</p>
    <button onclick="show('landing')">BACK</button>
  </div>
</div>

<script>
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'))
  const t=document.getElementById(id)
  if(t){
    t.classList.add('active')
  }
}

function forceLanding(){
  if(!document.querySelector('.screen.active')){
    show('landing')
  }
}

setTimeout(forceLanding,100)
setTimeout(forceLanding,500)
</script>

</body>
</html>
