
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Night Games – Multiplayer Engine (Killer Enabled)</title>

<style>
body{
background:#05070d;
color:white;
font-family:Arial;
text-align:center;
}

button{
padding:10px 16px;
margin:6px;
border-radius:20px;
border:none;
font-weight:bold;
}

.primary{background:#22c55e;color:black}

.panel{
background:rgba(255,255,255,.08);
padding:20px;
margin:20px auto;
width:420px;
border-radius:16px;
}

.player{
padding:10px;
border-bottom:1px solid rgba(255,255,255,.1);
}
</style>
</head>

<body>

<h1>NIGHT GAMES</h1>
<h3>Killer Multiplayer</h3>

<div class="panel">

<input id="nameInput" placeholder="Your name"><br><br>

<button class="primary" onclick="createRoom()">Create Room</button>
<br><br>

<input id="roomInput" placeholder="Room Code">
<button onclick="joinRoom()">Join Room</button>

</div>

<div class="panel">
<h3>Waiting Room</h3>
<div id="playerList"></div>
<button class="primary" onclick="startGame()">Start Game</button>
</div>

<div class="panel">
<h3>Killer Board</h3>
<div id="gameArea"></div>
<button onclick="nextTurn()">Next Turn</button>
</div>

<script>

let roomId = null
let playerName = null
let players = []
let currentTurn = 0
let gameStarted = false

function createRoom(){

playerName = document.getElementById("nameInput").value
roomId = Math.random().toString(36).substring(2,7)

localStorage.setItem("room_"+roomId, JSON.stringify({
players:[playerName],
turn:0,
started:false
}))

listenRoom()

alert("Room created. Code: " + roomId)

}

function joinRoom(){

playerName = document.getElementById("nameInput").value
roomId = document.getElementById("roomInput").value

let room = JSON.parse(localStorage.getItem("room_"+roomId))

if(!room){
alert("Room not found")
return
}

room.players.push(playerName)

localStorage.setItem("room_"+roomId, JSON.stringify(room))

listenRoom()

}

function listenRoom(){

setInterval(()=>{

let room = JSON.parse(localStorage.getItem("room_"+roomId))

if(!room) return

players = room.players
currentTurn = room.turn
gameStarted = room.started

renderPlayers()

if(gameStarted){
renderGame()
}

},500)

}

function renderPlayers(){

let html=""

players.forEach(p=>{
html += "<div class='player'>" + p + "</div>"
})

document.getElementById("playerList").innerHTML = html

}

function startGame(){

let room = JSON.parse(localStorage.getItem("room_"+roomId))
room.started = true

localStorage.setItem("room_"+roomId, JSON.stringify(room))

}

function renderGame(){

let html=""

players.forEach((p,i)=>{

let marker = i===currentTurn ? " <-- TURN" : ""

html += "<div class='player'>" + p + marker + "</div>"

})

document.getElementById("gameArea").innerHTML = html

}

function nextTurn(){

let room = JSON.parse(localStorage.getItem("room_"+roomId))

room.turn++
if(room.turn >= room.players.length){
room.turn = 0
}

localStorage.setItem("room_"+roomId, JSON.stringify(room))

}

</script>

</body>
</html>
