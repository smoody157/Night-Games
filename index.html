<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Night Games</title>

<!-- ===================================================== -->
<!-- SECTION 1 — VISUAL SETTINGS (SAFE TO EDIT)            -->
<!-- ===================================================== -->
<style>
  body{background:#0b0f18;color:#fff;font-family:Arial,Helvetica,sans-serif;margin:0}
  header{background:#020617;padding:18px;text-align:center;font-size:28px}
  .panel{padding:20px;text-align:center}
  button{padding:10px 20px;margin:6px;border-radius:6px;border:none;background:#22c55e;cursor:pointer}
  input{padding:10px;font-size:16px;border-radius:6px;border:none;width:260px;max-width:85%}
  .player{padding:6px}
  .online{color:#22c55e}
</style>
</head>

<body>
<header>Night Games</header>

<!-- ===================================================== -->
<!-- SECTION 2 — LOGIN SCREEN                              -->
<!-- ===================================================== -->
<div id="loginScreen" class="panel">
  <h2>Sign In</h2>
  <input id="email" placeholder="enter email">
  <br><br>
  <button id="enterBtn" type="button">ENTER</button>
</div>

<!-- ===================================================== -->
<!-- SECTION 3 — PLAYER PAGE                               -->
<!-- ===================================================== -->
<div id="playerScreen" class="panel" style="display:none">
  <h2>Players</h2>
  <div id="playerList"></div>
  <hr>
  <button id="practiceBtn" type="button">Practice</button>
  <button id="multiBtn" type="button">Multiplayer</button>
</div>

<!-- ===================================================== -->
<!-- SECTION 4 — MULTIPLAYER LOBBY                         -->
<!-- ===================================================== -->
<div id="lobbyScreen" class="panel" style="display:none">
  <h2>Lobby</h2>
  <div id="lobbyPlayers">Waiting for players...</div>
  <br>
  <button id="startBtn" type="button">Start Game</button>
</div>

<!-- ===================================================== -->
<!-- SECTION 5 — GAME AREA                                 -->
<!-- ===================================================== -->
<div id="gameScreen" class="panel" style="display:none">
  <h2 id="turnDisplay"></h2>
  <div style="margin:10px 0">Dart Board Test</div>
  <button type="button" data-score="20">20</button>
  <button type="button" data-score="19">19</button>
  <button type="button" data-score="18">18</button>
  <button type="button" data-score="5">5</button>
  <button type="button" data-score="1">1</button>
</div>

<script>
/* ===================================================== */
/* SECTION 6 — PLAYER REGISTRY                            */
/* ===================================================== */
const players = {
  "stevewmoody@yahoo.com": { name: "Steve Moody" },
  "jmoody7712@gmail.com": { name: "Jayce Moody" },
  "wmoody7931@aol.com":   { name: "Bill Moody" }
};
let currentPlayer = null;

/* ===================================================== */
/* SECTION 7 — UI HELPERS                                 */
/* ===================================================== */
function show(elId){
  document.getElementById("loginScreen").style.display = (elId==="loginScreen") ? "block" : "none";
  document.getElementById("playerScreen").style.display = (elId==="playerScreen") ? "block" : "none";
  document.getElementById("lobbyScreen").style.display = (elId==="lobbyScreen") ? "block" : "none";
  document.getElementById("gameScreen").style.display  = (elId==="gameScreen")  ? "block" : "none";
}

/* ===================================================== */
/* SECTION 8 — LOGIN SYSTEM                               */
/* ===================================================== */
function login(){
  const email = (document.getElementById("email").value || "").trim().toLowerCase();
  if(!email){ alert("Enter an email"); return; }

  if(!players[email]){
    const name = prompt("Enter your name");
    if(!name){ return; }
    players[email] = { name: name.trim() || "Player" };
  }
  currentPlayer = players[email];
  show("playerScreen");
  renderPlayers();
}

/* ===================================================== */
/* SECTION 9 — PLAYER LIST                                */
/* ===================================================== */
function renderPlayers(){
  const list = document.getElementById("playerList");
  list.innerHTML = "";
  Object.keys(players).forEach(email => {
    const div = document.createElement("div");
    div.className = "player";
    div.innerHTML = players[email].name + " <span class='online'>●</span>";
    list.appendChild(div);
  });
}

/* ===================================================== */
/* SECTION 10 — PRACTICE MODE (LOCAL ONLY)                */
/* ===================================================== */
function practice(){
  alert("Practice mode (local only). Stats disabled.");
  show("gameScreen");
  startTurn();
}

/* ===================================================== */
/* SECTION 11 — LOBBY (UI ONLY FOR NOW)                   */
/* ===================================================== */
function openLobby(){
  show("lobbyScreen");
}
function startGame(){
  show("gameScreen");
  startTurn();
}

/* ===================================================== */
/* SECTION 12 — TURN SYSTEM                               */
/* ===================================================== */
let turnOrder = [];
let currentTurn = 0;
function startTurn(){
  turnOrder = [currentPlayer?.name || "Player"];
  currentTurn = 0;
  document.getElementById("turnDisplay").innerText = "Turn: " + turnOrder[currentTurn];
}

/* ===================================================== */
/* SECTION 13 — DART THROW ENGINE                         */
/* ===================================================== */
function throwDart(score){
  alert((currentPlayer?.name || "Player") + " scored " + score);
}

/* ===================================================== */
/* SECTION 14 — WIRE BUTTONS (NO SILENT FAIL)             */
/* ===================================================== */
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("enterBtn").addEventListener("click", login);
  document.getElementById("practiceBtn").addEventListener("click", practice);
  document.getElementById("multiBtn").addEventListener("click", openLobby);
  document.getElementById("startBtn").addEventListener("click", startGame);

  // score buttons
  document.querySelectorAll("[data-score]").forEach(btn => {
    btn.addEventListener("click", () => throwDart(Number(btn.dataset.score)));
  });
});

/* ===================================================== */
/* SECTION 15 — FIREBASE (COMING NEXT)                    */
/* We will add Firestore presence + rooms AFTER this base */
/* is confirmed stable on your phone.                     */
/* ===================================================== */
</script>

</body>
</html>
