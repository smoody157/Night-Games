<script>

/* =========================================================
   SCREEN REGISTRY
   Keeps track of every screen in the application.
   ========================================================= */

const SCREEN_REGISTRY = {

    landing: "screen_landing",
    hub: "screen_hub",
    waiting: "screen_waiting",
    game: "screen_game",
    history: "screen_history"

};


/* =========================================================
   SCREEN UTILITY
   Returns a screen element safely.
   ========================================================= */

function getScreen(id){

    return document.getElementById(id);

}


/* =========================================================
   HIDE ALL SCREENS
   Used before activating a new one.
   ========================================================= */

function hideAllScreens(){

    const screens = document.querySelectorAll(".screen");

    screens.forEach(function(screen){

        screen.classList.remove("active");

    });

}


/* =========================================================
   SHOW SCREEN
   Main routing function used across the app.
   ========================================================= */

function showScreen(screenId){

    hideAllScreens();

    const screen = getScreen(screenId);

    if(!screen){

        console.error("Screen not found:", screenId);
        return;

    }

    screen.classList.add("active");

}


/* =========================================================
   SAFE SCREEN BOOT
   Prevents the application from starting on a blank page.
   ========================================================= */

function bootScreenSystem(){

    const firstScreen = getScreen(SCREEN_REGISTRY.landing);

    if(!firstScreen){

        console.error("Landing screen missing.");
        return;

    }

    showScreen(SCREEN_REGISTRY.landing);

}


/* =========================================================
   SCREEN DEBUG LOGGER
   ========================================================= */

function logScreenChange(screen){

    console.log("[Screen Change]", screen);

}

</script>

<script>

/* =========================================================
   LANDING INPUT ELEMENTS
   ========================================================= */

const playerInput =
document.getElementById("playerNameInput");

const enterButton =
document.getElementById("enterAppButton");


/* =========================================================
   INTRO AUDIO SYSTEM
   ========================================================= */

const introAudio =
new Audio(APP_CONFIG.audio.intro);

let introPlayed = false;


/* =========================================================
   PLAY INTRO AUDIO WHEN PLAYER TOUCHES INPUT
   ========================================================= */

if(playerInput){

    playerInput.addEventListener("focus", function(){

        if(introPlayed) return;

        introPlayed = true;

        introAudio.play().catch(function(){
            console.log("Audio blocked until interaction.");
        });

    });

}


/* =========================================================
   ENTER APPLICATION
   Saves player name and opens the hub screen.
   ========================================================= */

function enterApplication(){

    const playerName = playerInput.value.trim();

    if(!playerName){

        alert("Please enter your name.");
        return;

    }

    APP_STATE.player.name = playerName;

    localStorage.setItem(
        "nightgames_player_name",
        playerName
    );

    showScreen(SCREEN_REGISTRY.hub);

}


/* =========================================================
   ENTER BUTTON EVENT
   ========================================================= */

if(enterButton){

    enterButton.addEventListener("click", enterApplication);

}


/* =========================================================
   AUTOLOAD PLAYER NAME IF SAVED
   ========================================================= */

const savedName =
localStorage.getItem("nightgames_player_name");

if(savedName && playerInput){

    playerInput.value = savedName;

}

</script>

<script>

/* =========================================================
   HUB ELEMENT REFERENCES
   ========================================================= */

const createSessionButton =
document.getElementById("createSessionButton");

const sessionListContainer =
document.getElementById("sessionListContainer");


/* =========================================================
   SESSION LIST STATE
   ========================================================= */

let SESSION_LIST = [];


/* =========================================================
   RENDER SESSION LIST
   ========================================================= */

function renderSessionList(){

    if(!sessionListContainer) return;

    sessionListContainer.innerHTML = "";

    if(SESSION_LIST.length === 0){

        sessionListContainer.innerHTML =
        "<div class='card'>No active games</div>";

        return;
    }

    SESSION_LIST.forEach(function(session){

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML =
        "<strong>Host:</strong> " + session.host +
        "<br>" +
        "<button onclick='joinSession(\"" + session.id + "\")'>Join Game</button>";

        sessionListContainer.appendChild(card);

    });

}


/* =========================================================
   CREATE SESSION
   ========================================================= */

function createSession(){

    const newSession = {

        id: "session_" + Date.now(),

        host: APP_STATE.player.name,

        created: Date.now(),

        players: []

    };

    SESSION_LIST.push(newSession);

    renderSessionList();

    console.log("Session created:", newSession);

}


/* =========================================================
   JOIN SESSION
   ========================================================= */

function joinSession(sessionId){

    const session =
    SESSION_LIST.find(s => s.id === sessionId);

    if(!session) return;

    APP_STATE.session.id = sessionId;
    APP_STATE.session.host = session.host;

    console.log("Joined session:", sessionId);

    showScreen(SCREEN_REGISTRY.waiting);

}


/* =========================================================
   CREATE SESSION BUTTON EVENT
   ========================================================= */

if(createSessionButton){

    createSessionButton.addEventListener(
        "click",
        createSession
    );

}


/* =========================================================
   INITIAL HUB LOAD
   ========================================================= */

function loadHub(){

    renderSessionList();

}

</script>

<script>

/* =========================================================
   WAITING ROOM ELEMENTS
   ========================================================= */

const playerListContainer =
document.getElementById("playerListContainer");

const leaveWaitingRoomButton =
document.getElementById("leaveWaitingRoomButton");


/* =========================================================
   CURRENT ROOM PLAYER LIST
   ========================================================= */

let WAITING_ROOM_PLAYERS = [];


/* =========================================================
   ENTER WAITING ROOM
   ========================================================= */

function enterWaitingRoom(){

    const playerName = APP_STATE.player.name;

    if(!playerName) return;

    WAITING_ROOM_PLAYERS.push(playerName);

    renderWaitingRoomPlayers();

}


/* =========================================================
   RENDER WAITING ROOM PLAYER LIST
   ========================================================= */

function renderWaitingRoomPlayers(){

    if(!playerListContainer) return;

    playerListContainer.innerHTML = "";

    WAITING_ROOM_PLAYERS.forEach(function(player){

        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = player;

        playerListContainer.appendChild(card);

    });

}


/* =========================================================
   LEAVE WAITING ROOM
   ========================================================= */

function leaveWaitingRoom(){

    const playerName = APP_STATE.player.name;

    WAITING_ROOM_PLAYERS =
    WAITING_ROOM_PLAYERS.filter(function(p){

        return p !== playerName;

    });

    renderWaitingRoomPlayers();

    showScreen(SCREEN_REGISTRY.hub);

}


/* =========================================================
   LEAVE ROOM BUTTON EVENT
   ========================================================= */

if(leaveWaitingRoomButton){

    leaveWaitingRoomButton.addEventListener(
        "click",
        leaveWaitingRoom
    );

}


/* =========================================================
   WAITING ROOM BOOT
   ========================================================= */

function bootWaitingRoom(){

    enterWaitingRoom();

}

</script>

<script>

/* =========================================================
   GAME SCREEN ELEMENTS
   ========================================================= */

const gameInterface =
document.getElementById("gameInterface");


/* =========================================================
   CURRENT GAME STATE
   ========================================================= */

let GAME_STATE = {

    activeGame: null,

    players: [],

    turnIndex: 0,

    round: 1

};


/* =========================================================
   START GAME
   ========================================================= */

function startGame(){

    GAME_STATE.activeGame = {

        id: "game_" + Date.now(),

        started: Date.now()

    };

    GAME_STATE.players = [...WAITING_ROOM_PLAYERS];

    GAME_STATE.turnIndex = 0;

    GAME_STATE.round = 1;

    renderGameInterface();

    showScreen(SCREEN_REGISTRY.game);

}


/* =========================================================
   NEXT TURN
   ========================================================= */

function nextTurn(){

    if(GAME_STATE.players.length === 0) return;

    GAME_STATE.turnIndex++;

    if(GAME_STATE.turnIndex >= GAME_STATE.players.length){

        GAME_STATE.turnIndex = 0;

        GAME_STATE.round++;

    }

    renderGameInterface();

}


/* =========================================================
   RENDER GAME INTERFACE
   ========================================================= */

function renderGameInterface(){

    if(!gameInterface) return;

    const currentPlayer =
    GAME_STATE.players[GAME_STATE.turnIndex];

    gameInterface.innerHTML =

        "<div class='card'>" +

        "<h3>Round " + GAME_STATE.round + "</h3>" +

        "<p><strong>Current Player:</strong> " +
        currentPlayer + "</p>" +

        "<button onclick='nextTurn()'>Next Turn</button>" +

        "</div>";

}


/* =========================================================
   END GAME
   ========================================================= */

function endGame(){

    GAME_STATE.activeGame = null;

    GAME_STATE.players = [];

    GAME_STATE.turnIndex = 0;

    GAME_STATE.round = 1;

    showScreen(SCREEN_REGISTRY.hub);

}

</script>

<script>

/* =========================================================
   GAME RULE DEFINITIONS
   ========================================================= */

const GAME_RULES = [

    {
        id: "301",
        name: "301",
        description: "Players start at 301 and race to zero.",
        startingScore: 301
    },

    {
        id: "501",
        name: "501",
        description: "Players start at 501 and race to zero.",
        startingScore: 501
    },

    {
        id: "cricket",
        name: "Cricket",
        description: "Close numbers 15–20 and bullseye."
    }

];


/* =========================================================
   CURRENT RULE
   ========================================================= */

let ACTIVE_RULE = null;


/* =========================================================
   SELECT RULE
   ========================================================= */

function selectRule(ruleId){

    const rule =
    GAME_RULES.find(r => r.id === ruleId);

    if(!rule){

        console.error("Rule not found:", ruleId);
        return;

    }

    ACTIVE_RULE = rule;

    console.log("Rule selected:", rule.name);

}


/* =========================================================
   APPLY RULE TO GAME STATE
   ========================================================= */

function applyRuleToGame(){

    if(!ACTIVE_RULE) return;

    if(ACTIVE_RULE.startingScore){

        GAME_STATE.players = GAME_STATE.players.map(function(player){

            return {
                name: player,
                score: ACTIVE_RULE.startingScore
            };

        });

    }

}


/* =========================================================
   LIST RULES
   ========================================================= */

function listRules(){

    console.log("Available Rules:");

    GAME_RULES.forEach(function(rule){

        console.log(rule.name + " — " + rule.description);

    });

}

</script>

<script>

/* =========================================================
   GAME RANDOMIZER LIST
   ========================================================= */

const RANDOM_GAME_POOL = [

    "301",
    "501",
    "Cricket",
    "Around the Clock",
    "Killer",
    "Shanghai"

];


/* =========================================================
   CURRENT RANDOM GAME
   ========================================================= */

let CURRENT_RANDOM_GAME = null;


/* =========================================================
   RANDOM GAME GENERATOR
   ========================================================= */

function randomizeGame(){

    const index =
    Math.floor(Math.random() * RANDOM_GAME_POOL.length);

    CURRENT_RANDOM_GAME =
    RANDOM_GAME_POOL[index];

    console.log("Random Game Selected:", CURRENT_RANDOM_GAME);

    return CURRENT_RANDOM_GAME;

}


/* =========================================================
   RANDOMIZER WITH TRANSITION EFFECT
   ========================================================= */

function spinRandomizer(){

    if(!gameInterface) return;

    gameInterface.innerHTML =
        "<div class='card'><h3>Spinning Randomizer...</h3></div>";

    setTimeout(function(){

        const game = randomizeGame();

        gameInterface.innerHTML =
            "<div class='card'>" +
            "<h3>Selected Game</h3>" +
            "<p><strong>" + game + "</strong></p>" +
            "<button onclick='startGame()'>Start Game</button>" +
            "</div>";

    }, 1200);

}


/* =========================================================
   RANDOMIZER DEBUG TOOL
   ========================================================= */

function testRandomizer(){

    console.log("Testing randomizer...");

    for(let i = 0; i < 5; i++){

        console.log(randomizeGame());

    }

}

</script>

<script>

/* =========================================================
   HISTORY STORAGE
   Stores completed games locally and prepares for Firebase.
   ========================================================= */

let GAME_HISTORY = [];


/* =========================================================
   HISTORY ELEMENT
   ========================================================= */

const historyContainer =
document.getElementById("historyContainer");


/* =========================================================
   SAVE GAME TO HISTORY
   ========================================================= */

function saveGameToHistory(){

    if(!GAME_STATE.activeGame) return;

    const historyEntry = {

        gameId: GAME_STATE.activeGame.id,

        players: GAME_STATE.players,

        roundsPlayed: GAME_STATE.round,

        finished: Date.now()

    };

    GAME_HISTORY.push(historyEntry);

    localStorage.setItem(
        "nightgames_history",
        JSON.stringify(GAME_HISTORY)
    );

}


/* =========================================================
   LOAD HISTORY FROM STORAGE
   ========================================================= */

function loadHistory(){

    const storedHistory =
    localStorage.getItem("nightgames_history");

    if(storedHistory){

        GAME_HISTORY =
        JSON.parse(storedHistory);

    }

}


/* =========================================================
   RENDER HISTORY
   ========================================================= */

function renderHistory(){

    if(!historyContainer) return;

    historyContainer.innerHTML = "";

    if(GAME_HISTORY.length === 0){

        historyContainer.innerHTML =
        "<div class='card'>No games played yet.</div>";

        return;

    }

    GAME_HISTORY.forEach(function(game){

        const card =
        document.createElement("div");

        card.className = "card";

        card.innerHTML =

            "<strong>Game ID:</strong> " +
            game.gameId +

            "<br><strong>Players:</strong> " +
            game.players.map(p => p.name || p).join(", ") +

            "<br><strong>Rounds:</strong> " +
            game.roundsPlayed;

        historyContainer.appendChild(card);

    });

}


/* =========================================================

<script>

/* =========================================================
   SESSION REGISTRY
   ========================================================= */

let SESSION_REGISTRY = [];


/* =========================================================
   CREATE SESSION
   ========================================================= */

function createSession(){

    const session = {

        id: "session_" + Date.now(),

        host: APP_STATE.player.name,

        players: [],

        created: Date.now(),

        active: true

    };

    SESSION_REGISTRY.push(session);

    APP_STATE.session.id = session.id;
    APP_STATE.session.host = session.host;

    console.log("Session created:", session);

    return session;

}


/* =========================================================
   FIND SESSION
   ========================================================= */

function getSession(sessionId){

    return SESSION_REGISTRY.find(function(s){

        return s.id === sessionId;

    });

}


/* =========================================================
   JOIN SESSION
   ========================================================= */

function joinSession(sessionId){

    const session = getSession(sessionId);

    if(!session) return;

    const player = {

        id: APP_STATE.player.id,
        name: APP_STATE.player.name

    };

    session.players.push(player);

    APP_STATE.session.id = sessionId;

    console.log("Joined session:", sessionId);

}


/* =========================================================
   LEAVE SESSION
   ========================================================= */

function leaveSession(){

    const session =
    getSession(APP_STATE.session.id);

    if(!session) return;

    session.players =
    session.players.filter(function(p){

        return p.id !== APP_STATE.player.id;

    });

    APP_STATE.session.id = null;

    showScreen(SCREEN_REGISTRY.hub);

}


/* =========================================================
   END SESSION
   ========================================================= */

function endSession(sessionId){

    const session = getSession(sessionId);

    if(!session) return;

    session.active = false;

    console.log("Session ended:", sessionId);

}


/* =========================================================
   LIST SESSIONS
   ========================================================= */

function listSessions(){

    console.log("Active Sessions:");

    SESSION_REGISTRY.forEach(function(session){

        if(session.active){

            console.log(session.id + " — Host: " + session.host);

        }

    });

}

</script>

<script type="module">

/* =========================================================
   REALTIME SESSION LISTENER
   Watches the sessions collection and updates the hub.
   ========================================================= */

import {
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";


function listenForSessions(){

  const sessionsRef = collection(db, "sessions");

  onSnapshot(sessionsRef, function(snapshot){

    SESSION_LIST = [];

    snapshot.forEach(function(doc){

      SESSION_LIST.push({

        id: doc.id,
        ...doc.data()

      });

    });

    renderSessionList();

    console.log("Sessions updated");

  });

}


/* =========================================================
   REALTIME PLAYER LISTENER
   Watches players inside the current session.
   ========================================================= */

function listenForPlayers(sessionId){

  const playersRef =
  collection(db, "sessions", sessionId, "players");

  onSnapshot(playersRef, function(snapshot){

    WAITING_ROOM_PLAYERS = [];

    snapshot.forEach(function(doc){

      WAITING_ROOM_PLAYERS.push(doc.data().name);

    });

    renderWaitingRoomPlayers();

    console.log("Players updated");

  });

}


/* =========================================================
   START REALTIME LISTENERS
   ========================================================= */

function startRealtimeListeners(){

  listenForSessions();

  if(APP_STATE.session.id){

    listenForPlayers(APP_STATE.session.id);

  }

}

</script>

                renderHub();

            }
        );

    }

/* =========================================================
   INPUT EVENTS
   ========================================================= */

function wireInputHandlers(){

    if(playerInput){

        playerInput.addEventListener(
            "keypress",
            function(event){

                if(event.key === "Enter"){

                    enterApplication();

                }

            }
        );

    }

}


/* =========================================================
   GAME EVENTS
   ========================================================= */

function wireGameHandlers(){

    if(!gameInterface) return;

    gameInterface.addEventListener(
        "click",
        function(event){

            const target = event.target;

            if(target.matches(".next-turn")){

                nextTurn();

            }

            if(target.matches(".end-game")){

                endGame();

            }

        }
    );

}


/* =========================================================
   MASTER EVENT BOOT
   ========================================================= */

function bootEventSystem(){

    wireEventHandlers();

    wireInputHandlers();

    wireGameHandlers();

}

<script>

/* =========================================================
   UNIQUE ID GENERATOR
   ========================================================= */

function generateId(prefix){

    return prefix + "_" + Date.now() + "_" + Math.floor(Math.random() * 1000);

}


/* =========================================================
   TIME FORMATTER
   Converts timestamps into readable time.
   ========================================================= */

function formatTime(timestamp){

    const date = new Date(timestamp);

    return date.toLocaleString();

}


/* =========================================================
   SAFE ELEMENT SELECTOR
   ========================================================= */

function safeGet(id){

    const element = document.getElementById(id);

    if(!element){

        console.warn("Element not found:", id);

    }

    return element;

}


/* =========================================================
   CLEAR ELEMENT
   ========================================================= */

function clearElement(element){

    if(!element) return;

    element.innerHTML = "";

}


/* =========================================================
   CREATE CARD COMPONENT
   ========================================================= */

function createCard(content){

    const card = document.createElement("div");

    card.className = "card";

    card.innerHTML = content;

    return card;

}


/* =========================================================
   ARRAY SHUFFLE (for randomizers)
   ========================================================= */

function shuffleArray(array){

    for(let i = array.length - 1; i > 0; i--){

        const j = Math.floor(Math.random() * (i + 1));

        [array[i], array[j]] = [array[j], array[i]];

    }

    return array;

}


/* =========================================================
   DEBUG LOGGER
   ========================================================= */

function debugLog(message, data){

    console.log("[NightGames Debug]", message, data || "");

}

</script>
