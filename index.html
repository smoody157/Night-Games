<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Night Games v1237-FullSync</title>
<style>
  :root{
    --bg:#05070d; --glass: rgba(255,255,255,.18); --stroke: rgba(255,255,255,.20);
    --text:#fff; --muted:#a7b0c0; --accent:#22c55e; --gold:#fbbf24;
    --login-bg-img: url("IMG_7390.jpeg"); --player-bg-img: url("IMG_7315.jpeg");
  }
  body{ margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family: sans-serif; overflow:hidden; }
  .screen{ position: fixed; inset:48px 0 0 0; display:none; flex-direction:column; padding: 20px; box-sizing:border-box; background-size:cover; background-position:center; }
  #loginScreen{ display:flex; background-image: var(--login-bg-img); align-items:center; justify-content:flex-end; padding-bottom:100px; }
  #playerScreen{ background-image: var(--player-bg-img); }
  .topbar{ height:48px; display:flex; justify-content:space-between; align-items:center; padding:0 15px; background:rgba(0,0,0,.8); border-bottom:1px solid var(--stroke); font-size:12px; font-weight:900; }
  .glass{ background: linear-gradient(180deg, var(--glass), rgba(255,255,255,0.05)); backdrop-filter: blur(15px); border: 1px solid var(--stroke); border-radius: 20px; padding: 15px; margin-bottom: 15px; }
  input{ width: 80%; padding: 12px; border-radius: 999px; border: 1px solid var(--stroke); background: rgba(255,255,255,0.1); color:#fff; margin-bottom: 10px; }
  button{ padding: 10px 20px; border-radius: 999px; border: none; font-weight:900; cursor:pointer; background: var(--accent); color:#000; }
  button.ghost{ background: rgba(255,255,255,0.1); color:#fff; border: 1px solid var(--stroke); }
  .scrollArea{ max-height: 200px; overflow-y: auto; }
  .listRow{ display:flex; justify-content:space-between; align-items:center; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
  .online{ color: var(--accent); } .offline{ color: #666; }
</style>
</head>
<body>

<div class="topbar">
  <div>NIGHT GAMES</div>
  <div id="onlineStatus">CONNECTING...</div>
</div>

<div id="loginScreen" class="screen">
  <input id="email" type="email" placeholder="email@example.com">
  <button id="enterBtn">ENTER</button>
</div>

<div id="playerScreen" class="screen">
  <div class="glass">
    <h3>GAMES</h3>
    <div class="scrollArea">
      <div class="listRow"><span>Killer (Multiplayer)</span><button onclick="joinLobby()">JOIN</button></div>
    </div>
  </div>
  <div class="glass">
    <h3>ONLINE PLAYERS</h3>
    <div id="playerList" class="scrollArea"></div>
  </div>
</div>

<div id="lobbyScreen" class="screen">
  <div class="glass">
    <h3>LOBBY</h3>
    <div id="inviteArea"></div>
    <button id="startGameBtn">START GAME</button>
    <button class="ghost" onclick="showOnly('playerScreen')">BACK</button>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="glass">
    <h2 id="turnDisplay">Turn: Waiting...</h2>
    <div id="scoreBoard"></div>
    <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:10px; margin-top:20px;">
      <button onclick="sendScore(20)">20</button><button onclick="sendScore(19)">19</button><button onclick="sendScore(18)">18</button>
      <button onclick="sendScore(5)">5</button><button onclick="sendScore(1)">1</button><button onclick="sendScore(0)">MISS</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
// REPLACE WITH YOUR CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

let myEmail = null;
let currentRoomId = null;

// --- NAV ---
function showOnly(id){
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById(id).style.display = 'flex';
}

// --- AUTH ---
document.getElementById('enterBtn').onclick = () => {
  const email = document.getElementById('email').value.trim();
  if(!email) return alert("Email required");
  myEmail = email;
  
  db.collection("players").doc(email).set({
    name: email.split('@')[0],
    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
    online: true
  }, {merge: true});

  showOnly('playerScreen');
  initPlayerSync();
};

// --- REAL-TIME PLAYERS ---
function initPlayerSync() {
  db.collection("players").onSnapshot(snap => {
    const list = document.getElementById('playerList');
    list.innerHTML = "";
    snap.forEach(doc => {
      const p = doc.data();
      list.innerHTML += `<div class="listRow">
        <span><span class="${p.online ? 'online':'offline'}">●</span> ${p.name}</span>
      </div>`;
    });
    document.getElementById('onlineStatus').innerText = "LIVE";
  });
}

// --- MULTIPLAYER ROOMS ---
function joinLobby() {
  showOnly('lobbyScreen');
  currentRoomId = "global_killer"; 
  db.collection("rooms").doc(currentRoomId).onSnapshot(doc => {
    if(doc.exists && doc.data().status === "active") {
      showOnly('gameScreen');
      initGameSync();
    }
  });
}

document.getElementById('startGameBtn').onclick = () => {
  db.collection("rooms").doc("global_killer").set({
    status: "active",
    turn: myEmail,
    scores: {}
  });
};

// --- GAMEPLAY SYNC ---
function initGameSync() {
  db.collection("rooms").doc("global_killer").onSnapshot(doc => {
    const data = doc.data();
    document.getElementById('turnDisplay').innerText = "Turn: " + data.turn;
  });
}

function sendScore(pts) {
  alert("Scored: " + pts);
  // Here we would update the Firestore doc with the new score
}
</script>
</body>
</html>
