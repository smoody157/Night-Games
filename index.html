<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Night Games v1237-Full-Multiplayer</title>

<style>
  :root{
    --bg:#05070d;
    --glass: rgba(255,255,255,.26);
    --glass2: rgba(255,255,255,.10);
    --stroke: rgba(255,255,255,.20);
    --text:#fff;
    --muted:#a7b0c0;
    --accent:#22c55e;
    --gold:#fbbf24;
    --login-bg-img: url("IMG_7390.jpeg");
    --player-bg-img: url("IMG_7315.jpeg");
    --logo-img: none;
    --login-bg-fallback: radial-gradient(circle at 50% 30%, rgba(34,197,94,.18), transparent 55%), linear-gradient(180deg, #020617 0%, #05070d 60%, #020617 100%);
  }

  body{ margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family: Arial, Helvetica, sans-serif; overflow:hidden; }

  /* ===================================================== 
  SECTION 2 — TOP STATUS BAR 
  ===================================================== 
  */
  .topbar{
    position:fixed; top:0; left:0; right:0; height:48px;
    display:flex; justify-content:space-between; align-items:center;
    padding:0 14px; z-index:100; font-weight:900; font-size:12px;
    background:rgba(0,0,0,0.8); border-bottom:1px solid var(--stroke);
  }
  .topbar .left{ color:var(--gold); text-transform: uppercase; }
  .topbar .right{ color:var(--accent); }

  /* ===================================================== 
  SECTION 3 — SCREEN DEFINITIONS
  ===================================================== 
  */
  .screen{
    position:fixed; top:48px; bottom:0; left:0; right:0;
    display:none; flex-direction:column;
    padding: 160px 14px 110px;
    background-size:cover; background-position:center;
    z-index:10; box-sizing:border-box;
  }
  #loginScreen{ display:flex; background-image: var(--login-bg-img); align-items:flex-end; padding-bottom:120px; z-index:20; }
  #playerScreen{ background-image: var(--player-bg-img); }

  /* ===================================================== 
  SECTION 5 — STEVE'S GLASS PANELS
  ===================================================== 
  */
  .glass{
    background: linear-gradient(180deg, var(--glass), var(--glass2));
    border: 1px solid var(--stroke);
    border-radius: 26px;
    backdrop-filter: blur(18px);
    box-shadow: 0 22px 60px rgba(0,0,0,.48);
    overflow:hidden; margin-bottom:14px;
    position:relative;
  }
  .glassHeader{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 14px; font-weight:900; text-transform:uppercase;
    background:rgba(0,0,0,.18); border-bottom:1px solid rgba(255,255,255,.10);
  }
  .scrollArea{ max-height: 260px; overflow-y:auto; padding:12px; -webkit-overflow-scrolling: touch; }

  /* ===================================================== 
  SECTION 6 — LOGIN CONTROLS (STEVE FIX)
  ===================================================== 
  */
  input#email{
    width: 86% !important; height: 40px;
    border-radius: 999px; border: 1px solid var(--stroke);
    background: rgba(255,255,255,.10); color:#fff;
    padding: 0 16px; margin-bottom:12px; outline:none; font-size:16px;
  }
  #email:-webkit-autofill { -webkit-text-fill-color: #fff !important; transition: background-color 9999s; }

  button.primary{
    height:42px; width:92%;
    background: var(--accent); border: none; color:#000;
    border-radius: 999px; font-weight:900; cursor:pointer;
    text-transform: uppercase;
  }
  button.ghost{
    height:32px; padding:6px 16px; font-size:12px;
    border-radius:999px; background:rgba(255,255,255,.08);
    color:#fff; border:1px solid var(--stroke); cursor:pointer;
  }

  .listRow{ display:flex; align-items:center; padding:12px 0; border-bottom:1px solid rgba(255,255,255,.08); }
  .dot{ margin-right:8px; font-size:18px; }
  .online{ color: var(--accent); }
  .offline{ color: #64748b; }
  .rowButtons{ margin-left:auto; display:flex; gap:8px; }

  .versionTag{ position:fixed; top:8px; left:14px; z-index:99999; font-weight:900; font-size:12px; color:rgba(255,255,255,.92); pointer-events:none; }
</style>
</head>

<body>
<div class="versionTag">v1237-FINAL-MULTI</div>

<div class="topbar">
  <div class="left">NIGHT GAMES</div>
  <div class="right" id="onlineStatus">CONNECTING...</div>
</div>

<div id="loginScreen" class="screen">
  <div style="width:100%; display:flex; flex-direction:column; align-items:center;">
    <input id="email" type="email" placeholder="ENTER EMAIL" autocomplete="off">
    <button id="enterBtn" class="primary">ENTER</button>
  </div>
</div>

<div id="playerScreen" class="screen">
  <div class="glass">
    <div class="glassHeader">GAMES <button class="ghost" onclick="window.open('https://venmo.com/u/Steve-Moody-8')">SUPPORT</button></div>
    <div class="scrollArea" id="gamesList">
      <div class="listRow"><div>01<div style="font-size:10px; color:var(--muted)">Multiplayer Sync</div></div><div class="rowButtons"><button class="ghost" onclick="launchGame('01')">PLAY</button></div></div>
      <div class="listRow"><div>CRICKET<div style="font-size:10px; color:var(--muted)">Multiplayer Sync</div></div><div class="rowButtons"><button class="ghost" onclick="launchGame('cricket')">PLAY</button></div></div>
      <div class="listRow"><div>KILLER<div style="font-size:10px; color:var(--muted)">Multiplayer Sync</div></div><div class="rowButtons"><button class="ghost" onclick="launchGame('killer')">PLAY</button></div></div>
      <div class="listRow"><div>SHANGHAI<div style="font-size:10px; color:var(--muted)">Multiplayer Sync</div></div><div class="rowButtons"><button class="ghost" onclick="launchGame('shanghai')">PLAY</button></div></div>
      <div class="listRow"><div>HALF-IT<div style="font-size:10px; color:var(--muted)">Multiplayer Sync</div></div><div class="rowButtons"><button class="ghost" onclick="launchGame('halfit')">PLAY</button></div></div>
      <div class="listRow"><div>ATW<div style="font-size:10px; color:var(--muted)">Multiplayer Sync</div></div><div class="rowButtons"><button class="ghost" onclick="launchGame('atw')">PLAY</button></div></div>
    </div>
  </div>

  <div class="glass">
    <div class="glassHeader">PLAYERS ONLINE</div>
    <div id="playerList" class="scrollArea"></div>
  </div>
</div>

<div id="gameScreen" class="screen">
  <div class="glass">
    <div class="glassHeader"><span id="activeGameTitle">GAME</span> <button class="ghost" onclick="location.reload()">EXIT</button></div>
    <div class="scrollArea" style="text-align:center;">
      <h1 id="scoreDisplay" style="font-size:54px; margin:10px 0;">0</h1>
      <p id="turnNotice" style="color:var(--accent); font-weight:900;">WAITING FOR TURN...</p>
      <div id="scoreboard" style="margin-bottom:20px; font-size:12px; opacity:0.8;"></div>
      <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:12px;">
        <button class="ghost" onclick="recordHit(20)">20</button>
        <button class="ghost" onclick="recordHit(19)">19</button>
        <button class="ghost" onclick="recordHit(18)">18</button>
        <button class="ghost" style="grid-column: span 3; background:var(--accent); color:#000;" onclick="recordHit(0)">MISS</button>
      </div>
    </div>
  </div>
</div>

<audio id="introAudio" src="IMG_new recording 2.mp3"></audio>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
/* ===================================================== 
   SECTION 21: THE BRAINS
   ===================================================== */
const firebaseConfig = {
  apiKey: "YOUR_KEY", authDomain: "YOUR_DOMAIN", projectId: "YOUR_ID",
  storageBucket: "YOUR_BUCKET", messagingSenderId: "YOUR_MSG_ID", appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
let userEmail = "";
let currentRoom = null;

// UI NAV
function showOnly(id){
  document.querySelectorAll('.screen').forEach(s=>s.style.display='none');
  document.getElementById(id).style.display='flex';
}

// LOGIN & ONLINE STATUS
document.getElementById('enterBtn').onclick = async () => {
  userEmail = document.getElementById('email').value.trim().toLowerCase();
  if(!userEmail) return;

  await db.collection("players").doc(userEmail).set({
    name: userEmail.split('@')[0],
    online: true,
    lastSeen: firebase.firestore.FieldValue.serverTimestamp()
  }, {merge:true});

  showOnly('playerScreen');
  syncApp();
};

function syncApp() {
  db.collection("players").onSnapshot(snap => {
    const list = document.getElementById('playerList');
    list.innerHTML = "";
    snap.forEach(doc => {
      const p = doc.data();
      list.innerHTML += `<div class="listRow"><span class="dot online">●</span>${p.name}</div>`;
    });
    document.getElementById('onlineStatus').innerText = "LIVE";
  });
}

// GAME LAUNCHER
async function launchGame(type) {
  const roomId = "room_" + Date.now();
  currentRoom = roomId;
  await db.collection("rooms").doc(roomId).set({
    gameType: type, status: "active", turn: userEmail,
    players: [userEmail], scores: { [userEmail]: 0 }
  });
  enterGame(type);
}

function enterGame(type) {
  document.getElementById('activeGameTitle').innerText = type.toUpperCase();
  showOnly('gameScreen');
  db.collection("rooms").doc(currentRoom).onSnapshot(doc => {
    const data = doc.data();
    if(!data) return;
    document.getElementById('scoreDisplay').innerText = data.scores[userEmail] || 0;
    document.getElementById('turnNotice').innerText = (data.turn === userEmail) ? "YOUR THROW" : "WAITING...";
    let scoreBoardHtml = "";
    for(let p in data.scores) { scoreBoardHtml += `<div>${p.split('@')[0]}: ${data.scores[p]}</div>`; }
    document.getElementById('scoreboard').innerHTML = scoreBoardHtml;
  });
}

async function recordHit(pts) {
  const docRef = db.collection("rooms").doc(currentRoom);
  const snap = await docRef.get();
  const data = snap.data();
  if(data.turn !== userEmail) return;
  const nextScore = (data.scores[userEmail] || 0) + pts;
  await docRef.update({ [`scores.${userEmail}`]: nextScore });
}
</script>
</body>
</html>
