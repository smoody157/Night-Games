
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Night Games v1235_training_build</title>

<style>
body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
    color:white;
}

.header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    height:50px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    background:transparent;
    font-weight:bold;
    z-index:100;
}

.version{
    font-size:12px;
    opacity:0.8;
}

.screen{
    display:none;
    width:100%;
    height:100vh;
    overflow:auto;
    padding-top:70px;
}

.active{
    display:block;
}

.center{
    width:90%;
    max-width:600px;
    margin:auto;
}

.panel{
    background:rgba(255,255,255,0.1);
    border-radius:20px;
    padding:15px;
    margin-bottom:15px;
}

.scroll{
    max-height:300px;
    overflow-y:auto;
}

input{
    width:100%;
    padding:8px;
    border-radius:25px;
    border:none;
    text-align:center;
    margin-bottom:10px;
}

button{
    padding:8px 15px;
    border-radius:25px;
    border:none;
    cursor:pointer;
}

.btnRow{
    display:flex;
    justify-content:space-between;
    gap:10px;
}

.playerRow{
    display:flex;
    justify-content:space-between;
    padding:10px;
}

.green{
    color:#00ff7f;
}
</style>
</head>

<body>

<div class="header">
<div>Night Games</div>
<div class="version">v1235_training_build</div>
</div>

<div id="loginScreen" class="screen active">
<div class="center">
<div class="panel">
<h2>Login</h2>
<input id="emailInput" placeholder="Enter your email">
<button onclick="login()">ENTER</button>
<div id="loginMessage"></div>
</div>
</div>
</div>

<div id="playerScreen" class="screen">
<div class="center">

<div class="panel">
<h3>Games</h3>
<div class="scroll">

<div class="playerRow"><div>01</div><button onclick="openLobby('01')">Play</button></div>
<div class="playerRow"><div>Cricket</div><button onclick="openLobby('Cricket')">Play</button></div>
<div class="playerRow"><div>Killer</div><button onclick="openLobby('Killer')">Play</button></div>
<div class="playerRow"><div>Around The World</div><button onclick="openLobby('ATW')">Play</button></div>
<div class="playerRow"><div>Half It</div><button onclick="openLobby('HalfIt')">Play</button></div>

</div>
</div>

<div class="panel">
<h3>Players Online</h3>
<div id="playerList" class="scroll"></div>
</div>

<div class="btnRow">
<button onclick="logout()">Logout</button>
<button onclick="support()">❤️ Support</button>
</div>

</div>
</div>

<div id="lobbyScreen" class="screen">
<div class="center">
<div class="panel">
<h2>Game Lobby</h2>
<div id="lobbyGame"></div>

<h3>Players in Lobby</h3>
<div id="lobbyPlayers"></div>

<button onclick="startGame()">Start Game</button>
<button onclick="backPlayers()">Back</button>
</div>
</div>
</div>

<div id="gameScreen" class="screen">
<div class="center">
<div class="panel">
<h2>Game Running</h2>
<div id="gameArea">
Game engine placeholder — scoring logic goes here.
</div>
<button onclick="backPlayers()">Exit Game</button>
</div>
</div>
</div>

<script>

let currentUser = null
let players = []
let currentGame = null

function show(screen){
document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active")
})
document.getElementById(screen).classList.add("active")
}

function login(){
let email = document.getElementById("emailInput").value
if(!email){
document.getElementById("loginMessage").innerText="Enter email"
return
}
currentUser=email
if(!players.includes(email)){
players.push(email)
}
renderPlayers()
show("playerScreen")
}

function logout(){
currentUser=null
show("loginScreen")
}

function renderPlayers(){
let list=document.getElementById("playerList")
list.innerHTML=""
players.forEach(p=>{
let div=document.createElement("div")
div.className="playerRow"
div.innerHTML=`<div>${p}</div><div class='green'>online</div>`
list.appendChild(div)
})
}

function openLobby(game){
currentGame=game
document.getElementById("lobbyGame").innerText="Game: "+game
renderLobby()
show("lobbyScreen")
}

function renderLobby(){
let div=document.getElementById("lobbyPlayers")
div.innerHTML=""
players.forEach(p=>{
let d=document.createElement("div")
d.innerText=p
div.appendChild(d)
})
}

function startGame(){
document.getElementById("gameArea").innerText="Playing "+currentGame
show("gameScreen")
}

function backPlayers(){
show("playerScreen")
}

function support(){
window.open("https://venmo.com/u/Steve-Moody-8","_blank")
}

</script>

</body>
</html>
